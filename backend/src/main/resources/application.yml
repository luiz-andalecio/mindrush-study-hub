server:
  port: ${SERVER_PORT:8080}
  servlet:
    # Mantemos /api para bater com o frontend: axios baseURL = /api
    context-path: /api

spring:
  # Facilita o desenvolvimento: permite colocar DB_URL, DB_USER, DB_PASSWORD, JWT_SECRET etc.
  # no arquivo .env na raiz do monorepo e o Spring ler automaticamente.
  # (Quando você roda: cd backend && mvn spring-boot:run, o caminho ../.env existe.)
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mindrush}
    username: ${DB_USER:mindrush}
    password: ${DB_PASSWORD:mindrush}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  # Em dev, use um segredo grande (>= 32 chars) para HS256.
  secret: ${JWT_SECRET:DEV_DEV_DEV_DEV_DEV_DEV_DEV_DEV_DEV_DEV_DEV_123456}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
